services:
  mysql:
    image: mysql:8.4
    container_name: productapi-mysql
    environment:
      MYSQL_DATABASE: productdb
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

  productapi:
    build: .
    container_name: productapi-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/productdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      DDL_AUTO: update
      JWT_SECRET: U2VjcmV0S2V5Rm9ySmF2YUJhY2tlbmRBc3NpZ25tZW50VG9rZW5TaWduaW5nMjAyNg==
      JWT_ACCESS_TOKEN_MINUTES: 15
      JWT_REFRESH_TOKEN_DAYS: 7
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: Admin@12345
      ALLOWED_ORIGINS: http://localhost:3000
      REQUIRE_HTTPS: "false"
    ports:
      - "8080:8080"

volumes:
  mysql_data:
